<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, 'Apple Color Emoji', 'Segoe UI Emoji'; }
        .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.65); }
        .ring-progress {
            width: 140px; height: 140px; border-radius: 50%;
            background: conic-gradient(#22c55e var(--angle), #e5e7eb 0deg);
            display: grid; place-items: center;
        }
        .ring-progress > div { width: 110px; height: 110px; border-radius: 50%; background: white; display: grid; place-items: center; }
        .skeleton { background: linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0.08), rgba(0,0,0,0.04)); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-white to-emerald-50">
    <header class="sticky top-0 z-40 bg-white/80 border-b border-slate-200 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-emerald-500 grid place-items-center text-white font-bold">RA</div>
                <h1 class="text-xl font-semibold text-slate-800">Resume Analyzer</h1>
            </div>
            <a href="https://github.com" target="_blank" class="hidden md:inline text-sm text-slate-600 hover:text-slate-900">About</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section class="grid lg:grid-cols-2 gap-6 items-start">
            <div class="glass rounded-2xl p-6 shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold text-slate-800">Analyze your resume</h2>
                <p class="text-slate-600 mt-1 text-sm">Upload a PDF/DOCX/TXT file or paste your resume. Optionally paste a job description to tailor keyword analysis.</p>

                <form id="analyze-form" class="mt-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Upload resume file</label>
                        <label for="resume_file" class="group grid place-items-center text-center w-full border-2 border-dashed border-slate-300 rounded-xl p-6 hover:border-emerald-400 cursor-pointer">
                            <div class="text-slate-600">
                                <div class="font-medium">Drag & drop or click to upload</div>
                                <div class="text-xs mt-1">PDF, DOCX, or TXT</div>
                            </div>
                        </label>
                        <input id="resume_file" name="resume_file" type="file" accept=".pdf,.docx,.txt" class="hidden" />
                        <div id="file-name" class="text-xs text-slate-500 mt-1"></div>
                    </div>

                    <div>
                        <label for="resume_text" class="block text-sm font-medium text-slate-700 mb-1">Or paste resume text</label>
                        <textarea id="resume_text" name="resume_text" rows="8" class="w-full rounded-xl border-slate-300 focus:border-emerald-500 focus:ring-emerald-500" placeholder="Paste your resume text here..."></textarea>
                    </div>

                    <div>
                        <label for="job_description" class="block text-sm font-medium text-slate-700 mb-1">Job description (optional)</label>
                        <textarea id="job_description" name="job_description" rows="6" class="w-full rounded-xl border-slate-300 focus:border-emerald-500 focus:ring-emerald-500" placeholder="Paste the job description here for keyword coverage..."></textarea>
                    </div>

                    <div class="flex items-center justify-between">
                        <button type="button" id="sample-btn" class="text-sm text-emerald-700 hover:text-emerald-800">Use sample text</button>
                        <button type="submit" class="px-5 py-2.5 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700">Analyze</button>
                    </div>
                </form>
            </div>

            <div class="glass rounded-2xl p-6 shadow-sm border border-slate-200 min-h-[420px]">
                <h2 class="text-lg font-semibold text-slate-800">Results</h2>

                <div id="loading" class="hidden mt-6">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="h-24 rounded-xl skeleton"></div>
                        <div class="h-24 rounded-xl skeleton"></div>
                        <div class="h-24 rounded-xl skeleton"></div>
                    </div>
                    <div class="mt-4 h-48 rounded-xl skeleton"></div>
                </div>

                <div id="results" class="hidden">
                    <div class="mt-6 grid md:grid-cols-3 gap-4">
                        <div class="p-4 border rounded-xl">
                            <div class="ring-progress mx-auto" id="overall-ring" style="--angle: 0deg">
                                <div><span id="overall-score" class="text-2xl font-semibold text-slate-800">0</span></div>
                            </div>
                            <div class="text-center text-sm text-slate-600 mt-2">Overall Score</div>
                        </div>
                        <div class="p-4 border rounded-xl">
                            <div class="text-sm text-slate-500">Keyword Coverage</div>
                            <div class="mt-2 text-3xl font-semibold" id="keyword-coverage">0%</div>
                            <div class="mt-2 text-xs text-slate-500" id="keyword-missing"></div>
                        </div>
                        <div class="p-4 border rounded-xl">
                            <div class="text-sm text-slate-500">Readability (Flesch)</div>
                            <div class="mt-2 text-3xl font-semibold" id="reading-ease">0</div>
                            <div class="mt-2 text-xs text-slate-500" id="word-count">0 words</div>
                        </div>
                    </div>

                    <div class="mt-6 grid md:grid-cols-2 gap-4">
                        <div class="p-4 border rounded-xl">
                            <div class="text-sm text-slate-700 font-medium">Skills detected</div>
                            <div id="skills" class="mt-2 flex flex-wrap gap-2 text-sm"></div>
                        </div>
                        <div class="p-4 border rounded-xl">
                            <div class="text-sm text-slate-700 font-medium">Contacts & Sections</div>
                            <div class="mt-2 text-sm text-slate-700" id="contacts"></div>
                            <div class="mt-3 text-xs">
                                <div id="sections-present" class="text-emerald-700"></div>
                                <div id="sections-missing" class="text-rose-700 mt-1"></div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 p-4 border rounded-xl">
                        <div class="text-sm text-slate-700 font-medium">Suggestions</div>
                        <ul id="suggestions" class="mt-2 list-disc pl-5 text-sm text-slate-700"></ul>
                        <div id="warnings" class="mt-2 text-xs text-rose-700"></div>
                    </div>
                </div>

                <div id="error" class="hidden mt-6 p-4 border border-rose-200 bg-rose-50 text-rose-700 rounded-xl text-sm"></div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById('analyze-form');
        const fileInput = document.getElementById('resume_file');
        const fileName = document.getElementById('file-name');
        const resumeText = document.getElementById('resume_text');
        const jobDesc = document.getElementById('job_description');

        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorBox = document.getElementById('error');

        const overallRing = document.getElementById('overall-ring');
        const overallScore = document.getElementById('overall-score');
        const keywordCoverage = document.getElementById('keyword-coverage');
        const keywordMissing = document.getElementById('keyword-missing');
        const readingEase = document.getElementById('reading-ease');
        const wordCount = document.getElementById('word-count');
        const skillsBox = document.getElementById('skills');
        const contactsBox = document.getElementById('contacts');
        const sectionsPresent = document.getElementById('sections-present');
        const sectionsMissing = document.getElementById('sections-missing');
        const suggestionsList = document.getElementById('suggestions');
        const warningsBox = document.getElementById('warnings');
        const sampleBtn = document.getElementById('sample-btn');

        fileInput.addEventListener('change', () => {
            fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : '';
        });

        sampleBtn.addEventListener('click', () => {
            resumeText.value = `John Doe\nSan Francisco, CA | john.doe@email.com | (555) 123-4567 | linkedin.com/in/johndoe\n\nSummary\nSoftware engineer with 5+ years of experience building scalable web applications.\n\nExperience\nSenior Software Engineer, Acme Inc. — Jan 2022 – Present\n- Led migration from monolith to microservices, reducing deploy time by 70%\n- Built CI/CD with GitHub Actions and Terraform, cutting lead time by 40%\n- Optimized PostgreSQL queries, improving p95 latency by 35%\n\nSoftware Engineer, Beta Co. — Jun 2019 – Dec 2021\n- Developed React + Node features used by 200k MAU\n- Implemented end-to-end tests with Playwright, reducing regressions by 50%\n\nEducation\nB.S. in Computer Science, State University, 2019\n\nSkills\nPython, JavaScript, React, Node.js, FastAPI, PostgreSQL, Docker, Kubernetes, AWS, Terraform`;

            jobDesc.value = `We are hiring a Senior Software Engineer with experience in cloud infrastructure, microservices, CI/CD, AWS, Docker, Kubernetes, and relational databases like PostgreSQL. Experience with React and Node is a plus.`;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');
            results.classList.add('hidden');
            loading.classList.remove('hidden');

            const formData = new FormData();
            if (fileInput.files[0]) formData.append('resume_file', fileInput.files[0]);
            if (resumeText.value.trim()) formData.append('resume_text', resumeText.value.trim());
            if (jobDesc.value.trim()) formData.append('job_description', jobDesc.value.trim());

            try {
                const res = await fetch('/api/analyze', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) { throw new Error(data?.detail || data?.error || 'Unknown error'); }

                // Overall score
                const overall = data.score || 0;
                overallScore.textContent = Math.round(overall);
                const angle = Math.round(3.6 * Math.max(0, Math.min(100, overall)));
                overallRing.style.setProperty('--angle', angle + 'deg');

                // Keyword coverage
                keywordCoverage.textContent = (data.keywordAnalysis?.coverage ?? 0) + '%';
                const missing = data.keywordAnalysis?.topMissing || [];
                keywordMissing.textContent = missing.length ? ('Missing: ' + missing.slice(0,5).join(', ')) : 'All key terms covered';

                // Readability & length
                readingEase.textContent = data.highlights?.readingEase ?? 0;
                wordCount.textContent = (data.highlights?.wordCount ?? 0) + ' words';

                // Skills
                skillsBox.innerHTML = '';
                (data.highlights?.skills || []).slice(0, 30).forEach(skill => {
                    const chip = document.createElement('span');
                    chip.className = 'px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200';
                    chip.textContent = skill;
                    skillsBox.appendChild(chip);
                });

                // Contacts & sections
                const c = data.highlights?.contacts || {};
                contactsBox.innerHTML = `<div>${c.email || ''}</div><div>${c.phone || ''}</div><div>${c.linkedin || ''}</div>`;
                sectionsPresent.textContent = 'Present: ' + (data.highlights?.sectionsPresent || []).join(', ');
                sectionsMissing.textContent = 'Missing: ' + (data.highlights?.sectionsMissing || []).join(', ');

                // Suggestions & warnings
                suggestionsList.innerHTML = '';
                (data.suggestions || []).forEach(s => {
                    const li = document.createElement('li');
                    li.textContent = s;
                    suggestionsList.appendChild(li);
                });
                warningsBox.textContent = (data.warnings || []).join(' | ');

                results.classList.remove('hidden');
            } catch (err) {
                errorBox.textContent = err.message || 'Something went wrong';
                errorBox.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
